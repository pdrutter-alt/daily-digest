<!-- Canonical shell for the global-health-digest live artifact.
     Daily build: read data/pool.json, merge/curate, write the merged pool
     back to pool.json, then regenerate this file with the pool as the
     `items` array below (keep ids stable so per-device tick state still
     applies), and call mcp__cowork__update_artifact with id
     "global-health-digest". Do not change CSS/JS structure without
     updating this template. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Global Health Digest</title>
<style>
  :root {
    color-scheme: light;
    --ink: #1a1f26;
    --ink-soft: #4b5763;
    --ink-faint: #8a94a1;
    --paper: #fdfcfa;
    --line: #e4e0d8;
    --accent: #1f4d3d;
    --news: #3a5a78;
    --academic: #6b3f2e;
    --institutional: #8a6d1a;
    --tick: #1f4d3d;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 18px calc(96px + env(safe-area-inset-bottom)); }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  h1 { font-size: 23px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .meta { font-size: 13.5px; color: var(--ink-faint); }
  .demo-note {
    font-size: 14px; color: var(--ink-soft); background: #f4f1ea;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 20px; line-height: 1.5;
  }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex; gap: 14px; padding: 18px 2px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    max-height: 400px; overflow: hidden;
  }
  .item.clearing { opacity: 0; transform: translateX(6px); }
  .item.gone { max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; margin: 0; }
  .tick-wrap { flex-shrink: 0; padding-top: 2px; }
  .tick {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--ink-faint); background: none;
    cursor: pointer; display: block; padding: 0; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  /* Invisible 44px hit area for comfortable tapping on touch screens */
  .tick::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
  .tick:hover { border-color: var(--tick); }
  .tick.checked { background: var(--tick); border-color: var(--tick); }
  .tick.checked::after {
    content: ""; position: absolute; left: 8px; top: 4px;
    width: 6px; height: 11px; border: solid white;
    border-width: 0 2.5px 2.5px 0; transform: rotate(40deg);
  }
  .body { flex: 1; min-width: 0; }
  .row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #fff;
  }
  .tag.news { background: var(--news); }
  .tag.academic { background: var(--academic); }
  .tag.institutional { background: var(--institutional); }
  .age { font-size: 12.5px; color: var(--ink-faint); }
  .headline { font-size: 17.5px; font-weight: 600; line-height: 1.4; margin: 0 0 6px; color: var(--ink); letter-spacing: -0.005em; }
  .summary { font-size: 15.5px; line-height: 1.55; color: var(--ink-soft); margin: 0 0 8px; }
  .source-link { font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; padding: 4px 0; }
  .source-link:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 15px; padding: 48px 10px; }
  footer { margin-top: 24px; font-size: 12.5px; color: var(--ink-faint); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Global Health Digest</h1>
    <div class="meta" id="countMeta">— items</div>
  </header>

  <div class="demo-note">Updated 2026-07-23 · 15 new · 15 total</div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">Nothing left to read. Come back tomorrow.</div>

  <footer>Rolling 72-hour window · tick to clear early · state is local to this device</footer>
</div>

<script>
  const now = Date.now();

  const items = [

    "source": "UN News",
    "url": "https://news.un.org/en/story/2026/07/1167913",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {

    "source": "CNN",
    "url": "https://www.cnn.com/2026/07/10/africa/cdc-pepfar-hiv-aids-program-cliff-intl",

    "url": "https://www.devex.com/news/money-matters-who-funds-global-health-and-by-how-much-112429",

  {

    "category": "institutional",

    "summary": "The Partnership for Maternal, Newborn and Child Health launched a global campaign on 21 July to protect financing for women's, children's and adolescents' health amid unprecedented aid cuts. The two-year effort aims to mobilise domestic resources, strengthen national advocacy and safeguard international investment.",
    "source": "PMNCH/WHO",
    "url": "https://pmnch.who.int/news-and-events/news/item/21-07-2026-pmnch-launches-global-campaign-to-finance-women-s-children-s-and-adolescents-health",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-cgd-health-financing-compact",

    "summary": "A Center for Global Development analysis proposes rewriting the rules of health aid so domestic financing covers essential services 'first' and donor aid is used as a 'top up' to expand the affordable package at the margin. The model responds to mounting aid cuts and the search for more sustainable donor-recipient arrangements.",

    "url": "https://www.cgdev.org/blog/new-compact-global-health-financing-could-countries-and-donors-rewrite-rule-book-health-aid",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-gavi-record-immunisation",
    "category": "institutional",

    "source": "Gavi, the Vaccine Alliance",
    "url": "https://www.gavi.org/news/media-room/strong-progress-lower-income-countries-underscores-need-sustained-investment",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-who-hantavirus-over",
    "category": "institutional",
    "headline": "WHO declares cruise-ship hantavirus outbreak over as Ebola and Marburg persist",
    "summary": "WHO chief Tedros said the Andes hantavirus outbreak linked to the cruise ship MV Hondius is officially over after the last exposed contact cleared quarantine with no cases since 25 May; 13 cases and three deaths were recorded. He warned that concurrent Ebola and Marburg threats show 'no country alone can fight' cross-border outbreaks.",
    "source": "UN News",
    "url": "https://news.un.org/en/story/2026/07/1167865",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-lancet-gh-oda-defunding",
    "category": "academic",
    "headline": "Modelling links aid defunding to up to 22.6 million extra deaths by 2030",
    "summary": "A Lancet Global Health retrospective and forecasting analysis by ISGlobal finds higher ODA was historically associated with a 23% cut in all-cause and 39% cut in under-5 mortality across 93 low- and middle-income countries. It projects 9.4 million preventable deaths under mild defunding (a 6% annual cut) and up to 22.6 million under severe defunding by 2030, including 5.4 million children under five.",
    "source": "The Lancet Global Health",
    "url": "https://www.thelancet.com/journals/langlo/article/PIIS2214-109X(26)00008-2/fulltext",

  },
  {
    "id": "2026-07-23-mmwr-measles-wastewater",

    "headline": "MMWR: measles wastewater assay missed a B3 case in Wisconsin's first such detection",
    "summary": "In Wisconsin's first wastewater detection of measles (Walworth County, 2 February 2026), a widely used assay flagged a D8-genotype case before it was reported but failed to detect a second, B3-genotype case because of an A-to-G mutation in the probe-binding region. Developers subsequently released a modified assay with improved B3 detection.",
    "source": "CDC MMWR",
    "url": "https://www.cdc.gov/mmwr/volumes/75/wr/mm7527a1.htm",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-lancet-research-financing-emergency",
    "category": "academic",
    "headline": "Lancet: global health research-financing emergency threatens LMIC science ecosystems",
    "summary": "A Lancet analysis argues that abrupt aid cuts by high-income countries have created a research-financing emergency undermining national health-research and life-science ecosystems in low- and middle-income countries, and calls for measures to sustain them.",
    "source": "The Lancet",
    "url": "https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(26)00657-4/abstract",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-global-fund-shortfall",
    "category": "news",
    "headline": "Global Fund's eighth replenishment stalls at $12.64bn against an $18bn target",
    "summary": "The Global Fund secured US$12.64 billion in pledges at its November 2025 replenishment summit against an $18 billion target, and as of July 2026 several major donors including France, Japan and the European Commission had yet to pledge, leaving a multi-billion-dollar gap for HIV, TB and malaria programmes.",
    "source": "The Global Fund",
    "url": "https://www.theglobalfund.org/en/replenishment/",
    "publishedAt": "2026-07-23T16:54:21Z"
  },
  {
    "id": "2026-07-23-world-bank-17-per-capita",
    "category": "institutional",
    "headline": "World Bank: low-income countries spend just $17 per capita a year on health",
    "summary": "A World Bank Group report finds combined government and donor health spending averaged about $17 per capita in low-income countries in 2024, under a third of the $60 minimum for a basic service package, and $47 in lower-middle-income countries against a $90 benchmark. Real-terms spending has stagnated since 2018 as health's budget priority slips in many countries.",
    "source": "World Bank",
    "url": "https://www.worldbank.org/en/topic/health/publication/government-resources-projections-health-financing-report",
    "publishedAt": "2026-07-23T16:54:21Z"
  }
];

  const EXPIRY_HOURS = 72;
  const dismissedKey = "ghd_dismissed_v1";
  const getDismissed = () => {
    try { return JSON.parse(localStorage.getItem(dismissedKey) || "{}"); }
    catch (e) { return {}; }
  };
  const dismissed = getDismissed();

  const tagLabel = { news: "News", academic: "Academic", institutional: "Institutional" };

  const ageLabel = (iso) => {
    const hrs = (now - new Date(iso).getTime()) / 3600000;
    if (hrs < 1) return "just now";
    if (hrs < 24) return Math.round(hrs) + "h ago";
    return Math.round(hrs / 24) + "d ago";
  };

  function isExpired(iso) {
    return (now - new Date(iso).getTime()) / 3600000 >= EXPIRY_HOURS;
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const visible = items.filter(it => !dismissed[it.id] && !isExpired(it.publishedAt));

    document.getElementById("countMeta").textContent =
      visible.length + (visible.length === 1 ? " item" : " items") + " · rolling 72h window";
    document.getElementById("emptyState").style.display = visible.length ? "none" : "block";

    visible.forEach(it => {
      const el = document.createElement("div");
      el.className = "item";
      el.id = "row-" + it.id;
      el.innerHTML = `
        <div class="tick-wrap">
          <button class="tick" aria-label="Mark read" data-id="${it.id}"></button>
        </div>
        <div class="body">
          <div class="row-top">
            <span class="tag ${it.category}">${tagLabel[it.category]}</span>
            <span class="age">${ageLabel(it.publishedAt)}</span>
          </div>
          <p class="headline">${it.headline}</p>
          <p class="summary">${it.summary}</p>
          <a class="source-link" href="${it.url}" target="_blank" rel="noopener">${it.source} →</a>
        </div>
      `;
      list.appendChild(el);
    });

    list.querySelectorAll(".tick").forEach(btn => {
      btn.addEventListener("click", () => onTick(btn.dataset.id));
    });
  }

  function onTick(id) {
    const row = document.getElementById("row-" + id);
    const btn = row.querySelector(".tick");
    btn.classList.add("checked");
    row.classList.add("clearing");
    dismissed[id] = now;
    localStorage.setItem(dismissedKey, JSON.stringify(dismissed));
    setTimeout(() => {
      row.classList.add("gone");
      setTimeout(render, 380);
    }, 350);
  }

  render();
</script>
</body>
</html>
