<!-- Canonical shell for the global-health-digest live artifact.
     Daily build: read data/pool.json, merge/curate, write the merged pool
     back to pool.json, then regenerate this file with the pool as the
     `items` array below (keep ids stable so per-device tick state still
     applies), and call mcp__cowork__update_artifact with id
     "global-health-digest". Do not change CSS/JS structure without
     updating this template. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Global Health Digest</title>
<style>
  :root {
    color-scheme: light;
    --ink: #1a1f26;
    --ink-soft: #4b5763;
    --ink-faint: #8a94a1;
    --paper: #fdfcfa;
    --line: #e4e0d8;
    --accent: #1f4d3d;
    --news: #3a5a78;
    --academic: #6b3f2e;
    --institutional: #8a6d1a;
    --tick: #1f4d3d;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 18px calc(96px + env(safe-area-inset-bottom)); }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  h1 { font-size: 23px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .meta { font-size: 13.5px; color: var(--ink-faint); }
  .demo-note {
    font-size: 14px; color: var(--ink-soft); background: #f4f1ea;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 20px; line-height: 1.5;
  }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex; gap: 14px; padding: 18px 2px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    max-height: 400px; overflow: hidden;
  }
  .item.clearing { opacity: 0; transform: translateX(6px); }
  .item.gone { max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; margin: 0; }
  .tick-wrap { flex-shrink: 0; padding-top: 2px; }
  .tick {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--ink-faint); background: none;
    cursor: pointer; display: block; padding: 0; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  /* Invisible 44px hit area for comfortable tapping on touch screens */
  .tick::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
  .tick:hover { border-color: var(--tick); }
  .tick.checked { background: var(--tick); border-color: var(--tick); }
  .tick.checked::after {
    content: ""; position: absolute; left: 8px; top: 4px;
    width: 6px; height: 11px; border: solid white;
    border-width: 0 2.5px 2.5px 0; transform: rotate(40deg);
  }
  .body { flex: 1; min-width: 0; }
  .row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #fff;
  }
  .tag.news { background: var(--news); }
  .tag.academic { background: var(--academic); }
  .tag.institutional { background: var(--institutional); }
  .age { font-size: 12.5px; color: var(--ink-faint); }
  .headline { font-size: 17.5px; font-weight: 600; line-height: 1.4; margin: 0 0 6px; color: var(--ink); letter-spacing: -0.005em; }
  .summary { font-size: 15.5px; line-height: 1.55; color: var(--ink-soft); margin: 0 0 8px; }
  .source-link { font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; padding: 4px 0; }
  .source-link:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 15px; padding: 48px 10px; }
  footer { margin-top: 24px; font-size: 12.5px; color: var(--ink-faint); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Global Health Digest</h1>
    <div class="meta" id="countMeta">— items</div>
  </header>

  <div class="demo-note">Updated 2026-07-16 · 9 new · 15 total</div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">Nothing left to read. Come back tomorrow.</div>

  <footer>Rolling 72-hour window · tick to clear early · state is local to this device</footer>
</div>

<script>
  const now = Date.now();

  const items = [

    "source": "NPR",
    "url": "https://www.npr.org/2026/07/15/g-s1-133630/ebola-congo-deaths",

    "source": "UN News",
    "url": "https://news.un.org/en/story/2026/07/1167913",

  },
  {

    "source": "Devex",
    "url": "https://www.devex.com/news/devex-checkup-1-4b-global-fund-cuts-hit-over-100-countries-110462",

  {

    "source": "Think Global Health (CFR)",
    "url": "https://www.thinkglobalhealth.org/article/tracking-the-america-first-bilateral-health-agreements",

    "summary": "A study published in the New England Journal of Medicine on 8 July 2026 evaluated the meningococcal B vaccine for preventing Neisseria gonorrhoeae infection, a vaccine-repurposing approach that has drawn interest given rising antimicrobial resistance in gonorrhoea.",
    "source": "New England Journal of Medicine",
    "url": "https://www.nejm.org/doi/full/10.1056/NEJMoa2516739",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-mpox-cladei-outside-africa",
    "category": "institutional",
    "headline": "Clade I mpox now transmitting in communities outside Africa",
    "summary": "UK travel-health body NaTHNaC reports evidence of community transmission of clade I (including clade Ib) mpox outside the African region, with locally acquired cases in the US and parts of mainland Europe that have no travel link to countries with known clade Ib transmission.",
    "source": "NaTHNaC (TravelHealthPro)",
    "url": "https://travelhealthpro.org.uk/news/792/mpox-outbreak-community-transmission-of-clade-i-mpox-virus-outside-the-african-region",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {

    "category": "academic",

    "summary": "A narrative review in The Lancet Global Health untangles the relationship between HIV exposure and tuberculosis in children, noting that as fewer children are born with HIV, a growing population of HIV-exposed but uninfected children faces distinct infection risks that health systems need to address.",
    "source": "The Lancet Global Health",
    "url": "https://www.thelancet.com/journals/langlo/article/PIIS2214-109X(25)00540-6/fulltext",

  },
  {
    "id": "2026-07-16-h5n1-cdc-streamline",
    "category": "news",
    "headline": "CDC scales back H5N1 bird flu reporting as US human cases decline",
    "summary": "The US CDC said it is streamlining its H5N1 avian influenza updates to reflect a current situation marked by declining human cases and fewer animal detections in the United States, signalling an easing of the domestic outbreak that spread widely through poultry and dairy cattle over the past year.",
    "source": "CIDRAP",
    "url": "https://www.cidrap.umn.edu/avian-influenza-bird-flu/cdc-streamlines-h5n1-avian-flu-reporting",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-14-marburg-uganda",
    "category": "news",
    "headline": "Uganda confirms isolated Marburg virus death amid Ebola response",
    "summary": "Uganda notified WHO on 30 June 2026 of a confirmed Marburg virus disease case, a 17-month-old child in Kyegegwa District, western Uganda, who later died; the case was picked up through Ebola surveillance. No identified contacts have developed symptoms and there is no active case, but the detection complicates the wider regional Ebola response.",
    "source": "STAT News",
    "url": "https://www.statnews.com/2026/06/30/marburg-virus-cases-ugandan-ebola-outbreak-zone/",
    "publishedAt": "2026-07-14T08:05:00Z"
  },
  {
    "id": "2026-07-14-legionnaires-nyc",
    "category": "news",
    "headline": "Legionnaires' cluster on Manhattan's Upper East Side grows to 54 cases",
    "summary": "New York City health officials report a Legionnaires' disease community cluster on Manhattan's Upper East Side that has reached 54 confirmed cases, with no deaths, since it was first identified on 2 July 2026. Investigators believe the likely source is a contaminated cooling tower in the affected ZIP codes 10028, 10128 and 10075.",
    "source": "Spectrum News NY1",
    "url": "https://ny1.com/nyc/all-boroughs/health/2026/07/07/legionnaires--cluster-upper-east-side-new-york-city-2026",
    "publishedAt": "2026-07-14T08:05:00Z"
  },
  {
    "id": "2026-07-14-malaria-rtss-phase4",
    "category": "academic",
    "headline": "Real-world study confirms RTS,S malaria vaccine effectiveness in African children",
    "summary": "An interim analysis of a phase 4 surveillance study in The Lancet Global Health followed 45,000 children under 5 in Ghana, Malawi and Kenya and found the RTS,S/AS01E vaccine cut any malaria by 30% and severe malaria by 58% over the year after the third dose, with a 17% reduction in all-cause mortality. The findings align with earlier pilot-programme and phase 3 trial results.",
    "source": "The Lancet Global Health",
    "url": "https://www.thelancet.com/journals/langlo/article/PIIS2214-109X(25)00415-2/fulltext",
    "publishedAt": "2026-07-14T08:05:00Z"
  },
  {
    "id": "2026-07-14-africa-vaccine-manufacturing",
    "category": "news",
    "headline": "Gavi to make first cash disbursements to African vaccine manufacturers",
    "summary": "Gavi will make the first cash disbursements from its US$1.2 billion African Vaccine Manufacturing Accelerator to an African manufacturer in the second half of 2026, a 10-year scheme using demand-linked incentives to spur local production. The African Union and Africa CDC aim to produce 60% of the continent's vaccines locally by 2040.",
    "source": "Semafor",
    "url": "https://www.semafor.com/article/07/02/2026/africa-moves-ahead-with-vaccine-manufacturing-ambitions",
    "publishedAt": "2026-07-14T08:05:00Z"
  },
  {
    "id": "2026-07-14-cchf-spain",
    "category": "institutional",
    "headline": "Spain reports fatal Crimean-Congo haemorrhagic fever case in Salamanca",
    "summary": "Spanish health authorities reported a death from Crimean-Congo haemorrhagic fever in Salamanca on 10 July 2026 in a patient who had reported a tick bite. CCHF, an emerging tick-borne viral disease in parts of southern Europe, carries a case-fatality rate of roughly 30% according to WHO.",
    "source": "NaTHNaC (TravelHealthPro)",
    "url": "https://travelhealthpro.org.uk/news/781/crimean-congo-haemorrhagic-fever-in-spain",
    "publishedAt": "2026-07-14T08:05:00Z"
  },
  {
    "id": "2026-07-14-lenacapavir-rollout",
    "category": "institutional",
    "headline": "US and Global Fund expand long-acting HIV prevention rollout with lenacapavir",
    "summary": "The US and the Global Fund have expanded their commitment to scale up twice-yearly injectable lenacapavir for HIV prevention, aiming to reach an additional one million people over three years for a combined target of three million through 2028. First shipments reached Eswatini and Zambia in late 2025, with regulatory approvals following in Mozambique, Namibia and Kenya in January 2026.",
    "source": "The Global Fund",
    "url": "https://www.theglobalfund.org/en/updates/2026/2026-04-14-us-global-fund-expand-commitment-long-acting-hiv-prevention-country-rollout-lenacapavir-accelerates/",
    "publishedAt": "2026-07-14T08:05:00Z"
  }
];

  const EXPIRY_HOURS = 72;
  const dismissedKey = "ghd_dismissed_v1";
  const getDismissed = () => {
    try { return JSON.parse(localStorage.getItem(dismissedKey) || "{}"); }
    catch (e) { return {}; }
  };
  const dismissed = getDismissed();

  const tagLabel = { news: "News", academic: "Academic", institutional: "Institutional" };

  const ageLabel = (iso) => {
    const hrs = (now - new Date(iso).getTime()) / 3600000;
    if (hrs < 1) return "just now";
    if (hrs < 24) return Math.round(hrs) + "h ago";
    return Math.round(hrs / 24) + "d ago";
  };

  function isExpired(iso) {
    return (now - new Date(iso).getTime()) / 3600000 >= EXPIRY_HOURS;
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const visible = items.filter(it => !dismissed[it.id] && !isExpired(it.publishedAt));

    document.getElementById("countMeta").textContent =
      visible.length + (visible.length === 1 ? " item" : " items") + " · rolling 72h window";
    document.getElementById("emptyState").style.display = visible.length ? "none" : "block";

    visible.forEach(it => {
      const el = document.createElement("div");
      el.className = "item";
      el.id = "row-" + it.id;
      el.innerHTML = `
        <div class="tick-wrap">
          <button class="tick" aria-label="Mark read" data-id="${it.id}"></button>
        </div>
        <div class="body">
          <div class="row-top">
            <span class="tag ${it.category}">${tagLabel[it.category]}</span>
            <span class="age">${ageLabel(it.publishedAt)}</span>
          </div>
          <p class="headline">${it.headline}</p>
          <p class="summary">${it.summary}</p>
          <a class="source-link" href="${it.url}" target="_blank" rel="noopener">${it.source} →</a>
        </div>
      `;
      list.appendChild(el);
    });

    list.querySelectorAll(".tick").forEach(btn => {
      btn.addEventListener("click", () => onTick(btn.dataset.id));
    });
  }

  function onTick(id) {
    const row = document.getElementById("row-" + id);
    const btn = row.querySelector(".tick");
    btn.classList.add("checked");
    row.classList.add("clearing");
    dismissed[id] = now;
    localStorage.setItem(dismissedKey, JSON.stringify(dismissed));
    setTimeout(() => {
      row.classList.add("gone");
      setTimeout(render, 380);
    }, 350);
  }

  render();
</script>
</body>
</html>
