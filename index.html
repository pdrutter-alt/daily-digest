<!-- Canonical shell for the global-health-digest live artifact.
     Daily build: read data/pool.json, merge/curate, write the merged pool
     back to pool.json, then regenerate this file with the pool as the
     `items` array below (keep ids stable so per-device tick state still
     applies), and call mcp__cowork__update_artifact with id
     "global-health-digest". Do not change CSS/JS structure without
     updating this template. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Health Digest</title>
<style>
  :root {
    color-scheme: light;
    --ink: #1a1f26;
    --ink-soft: #52606d;
    --ink-faint: #8a94a1;
    --paper: #fdfcfa;
    --line: #e4e0d8;
    --accent: #1f4d3d;
    --news: #3a5a78;
    --academic: #6b3f2e;
    --institutional: #8a6d1a;
    --tick: #1f4d3d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 20px 80px; }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 6px;
  }
  h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .meta { font-size: 12.5px; color: var(--ink-faint); }
  .demo-note {
    font-size: 12px; color: var(--ink-soft); background: #f4f1ea;
    border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 12px; margin-bottom: 20px; line-height: 1.5;
  }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex; gap: 12px; padding: 14px 4px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    max-height: 300px; overflow: hidden;
  }
  .item.clearing { opacity: 0; transform: translateX(6px); }
  .item.gone { max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; margin: 0; }
  .tick-wrap { flex-shrink: 0; padding-top: 2px; }
  .tick {
    width: 19px; height: 19px; border-radius: 50%;
    border: 1.5px solid var(--ink-faint); background: none;
    cursor: pointer; display: block; padding: 0; position: relative;
  }
  .tick:hover { border-color: var(--tick); }
  .tick.checked { background: var(--tick); border-color: var(--tick); }
  .tick.checked::after {
    content: ""; position: absolute; left: 5px; top: 2px;
    width: 6px; height: 10px; border: solid white;
    border-width: 0 2px 2px 0; transform: rotate(40deg);
  }
  .body { flex: 1; min-width: 0; }
  .row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 999px; color: #fff;
  }
  .tag.news { background: var(--news); }
  .tag.academic { background: var(--academic); }
  .tag.institutional { background: var(--institutional); }
  .age { font-size: 11.5px; color: var(--ink-faint); }
  .headline { font-size: 15px; font-weight: 600; line-height: 1.35; margin: 0 0 4px; color: var(--ink); }
  .summary { font-size: 13.5px; line-height: 1.5; color: var(--ink-soft); margin: 0 0 6px; }
  .source-link { font-size: 12.5px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .source-link:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 13.5px; padding: 40px 10px; }
  footer { margin-top: 22px; font-size: 11px; color: var(--ink-faint); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Global Health Digest</h1>
    <div class="meta" id="countMeta">— items</div>
  </header>

  <div class="demo-note">Updated 2026-07-04 · 6 new · 10 total</div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">Nothing left to read. Come back tomorrow.</div>

  <footer>Rolling 72-hour window · tick to clear early · state is local to this device</footer>
</div>

<script>
  const now = Date.now();

  const items = [
  {
    "id": "2026-07-03-uganda-marburg",
    "category": "news",
    "headline": "Uganda reports Marburg virus disease outbreak amid ongoing Ebola response",
    "summary": "Uganda notified WHO that it had detected Marburg virus disease in the west of the country, with two confirmed cases reported as of late June. The detection complicates the regional response to what is already among the largest Ebola outbreaks on record in Central Africa.",
    "source": "STAT News",
    "url": "https://www.statnews.com/2026/06/30/marburg-virus-cases-ugandan-ebola-outbreak-zone/",
    "publishedAt": "2026-07-03T10:22:04Z"
  },
  {
    "id": "2026-07-03-gavi-board-avma",
    "category": "institutional",
    "headline": "Gavi board approves $189m package to boost African vaccine manufacturing",
    "summary": "At its 1-2 July meeting the Gavi board confirmed an additional US$189m beyond the US$1bn African Vaccine Manufacturing Accelerator, including US$139m to buy African-made vaccines and US$50m for Africa CDC, the African Medicines Agency and WHO. It also finalised Gavi 6.0 targets and a US$250m Resilience Mechanism for fragile settings.",
    "source": "Gavi, the Vaccine Alliance",
    "url": "https://www.gavi.org/news/media-room/gavi-board-meeting-underlines-commitment-country-sovereignty-fragility-health-security",
    "publishedAt": "2026-07-03T10:22:04Z"
  },
  {
    "id": "2026-07-03-cdc-h5n1-reporting",
    "category": "news",
    "headline": "CDC streamlines H5N1 avian flu reporting as human cases decline",
    "summary": "The US CDC will stop posting animal detections on its main H5N1 page and move to monthly reporting of people monitored and tested, while continuing to report new human H5 cases. More than 18,600 people have been monitored and over 880 tested after exposure since the outbreak began.",
    "source": "CIDRAP",
    "url": "https://www.cidrap.umn.edu/avian-influenza-bird-flu/cdc-streamlines-h5n1-avian-flu-reporting",
    "publishedAt": "2026-07-03T10:22:04Z"
  },
  {
    "id": "2026-07-02-us-measles-elimination",
    "category": "news",
    "headline": "US has effectively lost measles elimination status, CIDRAP op-ed argues",
    "summary": "The US logged 48 measles outbreaks in 2025 and another 30 in the first five-plus months of 2026, confirming 2,104 cases by 18 June, with the imported share of cases down to 6%, indicating transmission is now overwhelmingly domestic. The op-ed argues elimination has already been lost in substance, with PAHO's verification review postponed from April to November.",
    "source": "CIDRAP",
    "url": "https://www.cidrap.umn.edu/measles/cidrap-op-ed-call-it-what-it-us-has-lost-its-hold-measles-elimination",
    "publishedAt": "2026-07-02T15:33:51Z"
  },
  {
    "id": "2026-07-04-who-ebola-diagnostic-eul",
    "category": "institutional",
    "headline": "WHO lists first diagnostic test for Ebola Bundibugyo virus as DRC outbreak tops 1,400 cases",
    "summary": "WHO added the first diagnostic test for Bundibugyo ebolavirus to its Emergency Use Listing on 2 July, as the DRC outbreak reached 1,406 confirmed cases and 438 deaths, now the largest recorded outbreak of this Ebola species.",
    "source": "WHO",
    "url": "https://www.who.int/news/item/02-07-2026-who-adds-first-diagnostic-test-for-ebola-bundibugyo-virus-to-its-emergency-use-listing",
    "publishedAt": "2026-07-04T08:20:00Z"
  },
  {
    "id": "2026-07-04-who-hantavirus-outbreak-over",
    "category": "institutional",
    "headline": "WHO declares cruise-ship-linked hantavirus outbreak over",
    "summary": "WHO declared the Andes hantavirus outbreak linked to the M/V Hondius cruise ship over on 2 July, after the last of 317 high-risk contacts across 33 countries completed quarantine. Thirteen cases and three deaths were confirmed, a 23% case fatality ratio.",
    "source": "WHO Disease Outbreak News",
    "url": "https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON611",
    "publishedAt": "2026-07-04T08:20:00Z"
  },
  {
    "id": "2026-07-04-sudan-cholera-ends",
    "category": "news",
    "headline": "Sudan declares its 18-month cholera outbreak over",
    "summary": "Sudan's Ministry of Health declared the outbreak that began in July 2024 over after no cases were reported since 14 January. It sickened more than 100,000 people, with an estimated 2,400-3,000 deaths, worsened by conflict, displacement and damaged water infrastructure.",
    "source": "CIDRAP",
    "url": "https://www.cidrap.umn.edu/cholera/quick-takes-polio-2-nations-sudan-s-cholera-outbreak-ends-avian-flu-vaccine-trials-uk",
    "publishedAt": "2026-07-04T08:20:00Z"
  },
  {
    "id": "2026-07-04-globalfund-unitaid-20yr",
    "category": "institutional",
    "headline": "Global Fund marks 20 years of partnership with Unitaid",
    "summary": "The two organisations marked two decades of collaboration on 2 July, crediting the partnership with accelerating scale-up of generic dolutegravir-based HIV treatment and other innovations across HIV, TB, malaria and COVID-19.",
    "source": "The Global Fund",
    "url": "https://www.theglobalfund.org/en/updates/2026/2026-07-02-global-fund-20-years-transformative-partnership-unitaid/",
    "publishedAt": "2026-07-04T08:20:00Z"
  },
  {
    "id": "2026-07-04-globalfund-lebanon-iraq-tb-hiv",
    "category": "institutional",
    "headline": "Global Fund approves emergency TB/HIV funding for Lebanon and Iraq",
    "summary": "The Global Fund approved US$1.48m in emergency funding, running 1 July 2026 to 30 June 2027, to sustain TB and HIV diagnostics, treatment and outreach in Lebanon and Iraq, where regional conflict has displaced more than 15 million people and disrupted services.",
    "source": "The Global Fund",
    "url": "https://www.theglobalfund.org/en/updates/2026/2026-06-30-global-fund-approves-emergency-funding-maintain-tb-hiv-services-crisis-affected-lebanon-iraq/",
    "publishedAt": "2026-07-04T08:20:00Z"
  },
  {
    "id": "2026-07-04-nature-malaria-cd8-antigens",
    "category": "academic",
    "headline": "Nature study identifies cross-stage, cross-species malaria T cell antigens",
    "summary": "Researchers identified 453 Plasmodium peptides conserved across parasite life stages and species, with two antigens inducing protective CD8+ T cell immunity in rodents, a potential basis for a universal malaria vaccine.",
    "source": "Nature",
    "url": "https://www.nature.com/articles/s41586-026-10730-1",
    "publishedAt": "2026-07-04T08:20:00Z"
  }
];

  const EXPIRY_HOURS = 72;
  const dismissedKey = "ghd_dismissed_v1";
  const getDismissed = () => {
    try { return JSON.parse(localStorage.getItem(dismissedKey) || "{}"); }
    catch (e) { return {}; }
  };
  const dismissed = getDismissed();

  const tagLabel = { news: "News", academic: "Academic", institutional: "Institutional" };

  const ageLabel = (iso) => {
    const hrs = (now - new Date(iso).getTime()) / 3600000;
    if (hrs < 1) return "just now";
    if (hrs < 24) return Math.round(hrs) + "h ago";
    return Math.round(hrs / 24) + "d ago";
  };

  function isExpired(iso) {
    return (now - new Date(iso).getTime()) / 3600000 >= EXPIRY_HOURS;
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const visible = items.filter(it => !dismissed[it.id] && !isExpired(it.publishedAt));

    document.getElementById("countMeta").textContent =
      visible.length + (visible.length === 1 ? " item" : " items") + " · rolling 72h window";
    document.getElementById("emptyState").style.display = visible.length ? "none" : "block";

    visible.forEach(it => {
      const el = document.createElement("div");
      el.className = "item";
      el.id = "row-" + it.id;
      el.innerHTML = `
        <div class="tick-wrap">
          <button class="tick" aria-label="Mark read" data-id="${it.id}"></button>
        </div>
        <div class="body">
          <div class="row-top">
            <span class="tag ${it.category}">${tagLabel[it.category]}</span>
            <span class="age">${ageLabel(it.publishedAt)}</span>
          </div>
          <p class="headline">${it.headline}</p>
          <p class="summary">${it.summary}</p>
          <a class="source-link" href="${it.url}" target="_blank" rel="noopener">${it.source} →</a>
        </div>
      `;
      list.appendChild(el);
    });

    list.querySelectorAll(".tick").forEach(btn => {
      btn.addEventListener("click", () => onTick(btn.dataset.id));
    });
  }

  function onTick(id) {
    const row = document.getElementById("row-" + id);
    const btn = row.querySelector(".tick");
    btn.classList.add("checked");
    row.classList.add("clearing");
    dismissed[id] = now;
    localStorage.setItem(dismissedKey, JSON.stringify(dismissed));
    setTimeout(() => {
      row.classList.add("gone");
      setTimeout(render, 380);
    }, 350);
  }

  render();
</script>
</body>
</html>
