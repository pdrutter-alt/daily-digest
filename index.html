<!-- Canonical shell for the global-health-digest live artifact.
     Daily build: read data/pool.json, merge/curate, write the merged pool
     back to pool.json, then regenerate this file with the pool as the
     `items` array below (keep ids stable so per-device tick state still
     applies), and call mcp__cowork__update_artifact with id
     "global-health-digest". Do not change CSS/JS structure without
     updating this template. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Global Health Digest</title>
<style>
  :root {
    color-scheme: light;
    --ink: #1a1f26;
    --ink-soft: #4b5763;
    --ink-faint: #8a94a1;
    --paper: #fdfcfa;
    --line: #e4e0d8;
    --accent: #1f4d3d;
    --news: #3a5a78;
    --academic: #6b3f2e;
    --institutional: #8a6d1a;
    --tick: #1f4d3d;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 18px calc(96px + env(safe-area-inset-bottom)); }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  h1 { font-size: 23px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .meta { font-size: 13.5px; color: var(--ink-faint); }
  .demo-note {
    font-size: 14px; color: var(--ink-soft); background: #f4f1ea;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 20px; line-height: 1.5;
  }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex; gap: 14px; padding: 18px 2px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    max-height: 400px; overflow: hidden;
  }
  .item.clearing { opacity: 0; transform: translateX(6px); }
  .item.gone { max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; margin: 0; }
  .tick-wrap { flex-shrink: 0; padding-top: 2px; }
  .tick {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--ink-faint); background: none;
    cursor: pointer; display: block; padding: 0; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  /* Invisible 44px hit area for comfortable tapping on touch screens */
  .tick::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
  .tick:hover { border-color: var(--tick); }
  .tick.checked { background: var(--tick); border-color: var(--tick); }
  .tick.checked::after {
    content: ""; position: absolute; left: 8px; top: 4px;
    width: 6px; height: 11px; border: solid white;
    border-width: 0 2.5px 2.5px 0; transform: rotate(40deg);
  }
  .body { flex: 1; min-width: 0; }
  .row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #fff;
  }
  .tag.news { background: var(--news); }
  .tag.academic { background: var(--academic); }
  .tag.institutional { background: var(--institutional); }
  .age { font-size: 12.5px; color: var(--ink-faint); }
  .headline { font-size: 17.5px; font-weight: 600; line-height: 1.4; margin: 0 0 6px; color: var(--ink); letter-spacing: -0.005em; }
  .summary { font-size: 15.5px; line-height: 1.55; color: var(--ink-soft); margin: 0 0 8px; }
  .source-link { font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; padding: 4px 0; }
  .source-link:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 15px; padding: 48px 10px; }
  footer { margin-top: 24px; font-size: 12.5px; color: var(--ink-faint); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Global Health Digest</h1>
    <div class="meta" id="countMeta">— items</div>
  </header>

  <div class="demo-note">Updated 2026-07-09 · 0 new · 15 total</div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">Nothing left to read. Come back tomorrow.</div>

  <footer>Rolling 72-hour window · tick to clear early · state is local to this device</footer>
</div>

  const items = [

    "source": "Think Global Health (CFR)",
    "url": "https://www.thinkglobalhealth.org/article/tracking-the-america-first-bilateral-health-agreements",
    "publishedAt": "2026-07-08T10:47:03Z"

  {

    "summary": "WHO reports 1,460 confirmed cases and 452 deaths (case fatality ratio 30.9%) in the Democratic Republic of the Congo as of 1 July 2026, with about 38 new confirmed cases a day over the previous fortnight. No new cases have been reported in Uganda since 21 June.",
    "source": "WHO Disease Outbreak News",
    "url": "https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON612",

  },
  {

    "summary": "Uganda notified WHO on 30 June 2026 of a single confirmed Marburg case in Kyegegwa District, a child under two, picked up through enhanced surveillance for the concurrent Ebola outbreak. Contacts are being monitored with no symptoms reported, and Ugandan authorities say there is no wider Marburg outbreak.",

    "url": "https://www.statnews.com/2026/06/30/marburg-virus-cases-ugandan-ebola-outbreak-zone/",

  {

    "source": "Gavi (via ReliefWeb)",
    "url": "https://reliefweb.int/report/world/more-us-18-billion-support-african-vaccine-manufacturing-catching-missed-children-and-pandemic-preparedness-approved-gavi-board-steps-efforts-tackle-backsliding-and-fight-health-emergencies",
    "publishedAt": "2026-07-07T08:15:00Z"
  },
  {
    "id": "2026-07-07-mpox-clade-i-status",
    "category": "institutional",
    "headline": "Mpox clade I keeps declining in Africa but remains a continental emergency",
    "summary": "WHO's latest multi-country mpox situation report shows the decline in clade I cases continuing through June 2026, with Madagascar now reporting the most (689 cases in the six weeks to 14 June) and other affected countries, including DRC, under 100 each. Africa CDC has kept its Public Health Emergency of Continental Security in place.",
    "source": "WHO",
    "url": "https://cdn.who.int/media/docs/default-source/_sage-2026/multi-country-outbreak-of-mpox--external-situation-report_63.pdf",
    "publishedAt": "2026-07-07T08:15:00Z"
  },
  {
    "id": "2026-07-07-eu-health-resilience",
    "category": "news",

    "summary": "The EU has announced a Global Health Resilience Initiative that steers its Global Gateway investment tool toward health, aiming to mobilise up to EUR 300 billion in investment. Health Policy Watch reports more than EUR 6 billion had already gone into health projects by the end of 2025.",
    "source": "Health Policy Watch",
    "url": "https://healthpolicy-watch.news/eu-global-health-resilience-initiative/",

    "category": "news",

    "summary": "Bangladesh recorded 5,924 dengue cases and 18 deaths in the first half of 2026, with June alone (2,907 cases, 13 deaths) up sharply from May (715 cases, 1 death). Entomologists expect Dhaka cases to at least double in July as heavy rain, heat and lagging mosquito control fuel transmission.",
    "source": "Reuters (via The Express Tribune)",
    "url": "https://tribune.com.pk/story/2616044/bangladesh-warns-of-dengue-surge-as-weather-aids-spread",
    "publishedAt": "2026-07-07T08:07:17Z"
  },
  {
    "id": "2026-07-07-paho-measles-americas",
    "category": "institutional",
    "headline": "Measles cases in the Americas up 181% in 2026, PAHO reports",
    "summary": "PAHO's sixth situation report counts 22,974 confirmed measles cases and 39 deaths across 17 countries through late June, a 181% rise on 2025, with Mexico, Guatemala, the US and Canada accounting for 96%. Recent weekly totals are falling, but PAHO flags renewed transmission risk in post-earthquake Venezuela.",
    "source": "PAHO/WHO",
    "url": "https://www.paho.org/en/documents/situation-report-6-measles-americas-region-2-july-2026",

  },
  {
    "id": "2026-07-07-who-parliamentary-forum-financing",
    "category": "institutional",
    "headline": "WHO parliamentary forum presses for Pandemic Agreement action and sustainable health financing",
    "summary": "At the 79th World Health Assembly's Global Parliamentary Forum, WHO and the Inter-Parliamentary Union urged legislators to ratify and implement the Pandemic Agreement, finalise its PABS annex, and mobilise domestic resources, including health taxes, to fund resilient health systems.",
    "source": "WHO",
    "url": "https://www.who.int/news/item/06-07-2026-world-health-assembly-global-parliamentary-forum-from-commitment-to-action-on-the-who-pandemic-agreement-and-sustainable-financing-for-health",
    "publishedAt": "2026-07-07T08:07:17Z"
  },
  {
    "id": "2026-07-06-lmic-icu-pneumonia-mortality",
    "category": "academic",
    "headline": "ICU pneumonia mortality remains high in low- and middle-income countries, meta-analysis finds",
    "summary": "A systematic review of 52 studies from 18 countries (48,707 community-acquired pneumonia patients) found pooled 28-to-30-day ICU mortality of 37.1%, rising to 61% among those requiring mechanical ventilation. Authors warn population aging will sharply amplify ICU demand across LMICs.",
    "source": "NEJM Evidence",
    "url": "https://evidence.nejm.org/doi/10.1056/EVIDoa2500244",
    "publishedAt": "2026-07-06T08:37:58Z"
  }
];

  const EXPIRY_HOURS = 72;
  const dismissedKey = "ghd_dismissed_v1";
  const getDismissed = () => {
    try { return JSON.parse(localStorage.getItem(dismissedKey) || "{}"); }
    catch (e) { return {}; }
  };
  const dismissed = getDismissed();

  const tagLabel = { news: "News", academic: "Academic", institutional: "Institutional" };

  const ageLabel = (iso) => {
    const hrs = (now - new Date(iso).getTime()) / 3600000;
    if (hrs < 1) return "just now";
    if (hrs < 24) return Math.round(hrs) + "h ago";
    return Math.round(hrs / 24) + "d ago";
  };

  function isExpired(iso) {
    return (now - new Date(iso).getTime()) / 3600000 >= EXPIRY_HOURS;
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const visible = items.filter(it => !dismissed[it.id] && !isExpired(it.publishedAt));

    document.getElementById("countMeta").textContent =
      visible.length + (visible.length === 1 ? " item" : " items") + " · rolling 72h window";
    document.getElementById("emptyState").style.display = visible.length ? "none" : "block";

    visible.forEach(it => {
      const el = document.createElement("div");
      el.className = "item";
      el.id = "row-" + it.id;
      el.innerHTML = `
        <div class="tick-wrap">
          <button class="tick" aria-label="Mark read" data-id="${it.id}"></button>
        </div>
        <div class="body">
          <div class="row-top">
            <span class="tag ${it.category}">${tagLabel[it.category]}</span>
            <span class="age">${ageLabel(it.publishedAt)}</span>
          </div>
          <p class="headline">${it.headline}</p>
          <p class="summary">${it.summary}</p>
          <a class="source-link" href="${it.url}" target="_blank" rel="noopener">${it.source} →</a>
        </div>
      `;
      list.appendChild(el);
    });

    list.querySelectorAll(".tick").forEach(btn => {
      btn.addEventListener("click", () => onTick(btn.dataset.id));
    });
  }

  function onTick(id) {
    const row = document.getElementById("row-" + id);
    const btn = row.querySelector(".tick");
    btn.classList.add("checked");
    row.classList.add("clearing");
    dismissed[id] = now;
    localStorage.setItem(dismissedKey, JSON.stringify(dismissed));
    setTimeout(() => {
      row.classList.add("gone");
      setTimeout(render, 380);
    }, 350);
  }

  render();
</script>
</body>
</html>
