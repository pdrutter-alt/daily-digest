<!-- Canonical shell for the global-health-digest live artifact.
     Daily build: read data/pool.json, merge/curate, write the merged pool
     back to pool.json, then regenerate this file with the pool as the
     `items` array below (keep ids stable so per-device tick state still
     applies), and call mcp__cowork__update_artifact with id
     "global-health-digest". Do not change CSS/JS structure without
     updating this template. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Global Health Digest</title>
<style>
  :root {
    color-scheme: light;
    --ink: #1a1f26;
    --ink-soft: #4b5763;
    --ink-faint: #8a94a1;
    --paper: #fdfcfa;
    --line: #e4e0d8;
    --accent: #1f4d3d;
    --news: #3a5a78;
    --academic: #6b3f2e;
    --institutional: #8a6d1a;
    --tick: #1f4d3d;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 18px calc(96px + env(safe-area-inset-bottom)); }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  h1 { font-size: 23px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .meta { font-size: 13.5px; color: var(--ink-faint); }
  .demo-note {
    font-size: 14px; color: var(--ink-soft); background: #f4f1ea;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 20px; line-height: 1.5;
  }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex; gap: 14px; padding: 18px 2px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    max-height: 400px; overflow: hidden;
  }
  .item.clearing { opacity: 0; transform: translateX(6px); }
  .item.gone { max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; margin: 0; }
  .tick-wrap { flex-shrink: 0; padding-top: 2px; }
  .tick {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--ink-faint); background: none;
    cursor: pointer; display: block; padding: 0; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  /* Invisible 44px hit area for comfortable tapping on touch screens */
  .tick::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
  .tick:hover { border-color: var(--tick); }
  .tick.checked { background: var(--tick); border-color: var(--tick); }
  .tick.checked::after {
    content: ""; position: absolute; left: 8px; top: 4px;
    width: 6px; height: 11px; border: solid white;
    border-width: 0 2.5px 2.5px 0; transform: rotate(40deg);
  }
  .body { flex: 1; min-width: 0; }
  .row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #fff;
  }
  .tag.news { background: var(--news); }
  .tag.academic { background: var(--academic); }
  .tag.institutional { background: var(--institutional); }
  .age { font-size: 12.5px; color: var(--ink-faint); }
  .headline { font-size: 17.5px; font-weight: 600; line-height: 1.4; margin: 0 0 6px; color: var(--ink); letter-spacing: -0.005em; }
  .summary { font-size: 15.5px; line-height: 1.55; color: var(--ink-soft); margin: 0 0 8px; }
  .source-link { font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; padding: 4px 0; }
  .source-link:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 15px; padding: 48px 10px; }
  footer { margin-top: 24px; font-size: 12.5px; color: var(--ink-faint); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Global Health Digest</h1>
    <div class="meta" id="countMeta">— items</div>
  </header>

  <div class="demo-note">Updated 2026-07-20 · 8 new · 15 total</div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">Nothing left to read. Come back tomorrow.</div>

  <footer>Rolling 72-hour window · tick to clear early · state is local to this device</footer>
</div>

<script>
  const now = Date.now();

  const items = [
  {
    "id": "2026-07-19-pabs-federated-vs-hybrid",
    "category": "news",
    "headline": "Pandemic Agreement talks split between 'federated' and 'hybrid' pathogen-sharing models",
    "summary": "The seventh round of negotiations on the pathogen access and benefit-sharing (PABS) annex, the last outstanding piece of the WHO Pandemic Agreement, closed on 17 July with two opposing proposals on the table. Algeria, for the Africa Plus Group, backed a 'federated' model of sovereign national and regional nodes with binding benefit-sharing conditions at the point of use, while the EU tabled a 'hybrid' mix of mandatory and voluntary measures; talks resume 14-19 September.",
    "source": "Health Policy Watch",
    "url": "https://healthpolicy-watch.news/pandemic-talks-consider-two-opposing-models-for-pathogen-sharing/",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-19-unitaid-funding-shortfall",
    "category": "news",
    "headline": "Unitaid forecasts raising less than half its annual target as leadership search runs in secret",
    "summary": "Unitaid has raised $696 million towards a five-year goal of $1.5 billion and told its July board it expects to raise just $140 million this year against a $300 million target, as France and the UK cut contributions. The market-shaping agency, which negotiated $40-a-year generic pricing for lenacapavir, is recruiting a new executive director behind closed doors, drawing criticism that secret transitions at publicly funded bodies undermine their legitimacy.",
    "source": "Health Policy Watch",
    "url": "https://healthpolicy-watch.news/unitaid-leadership-search/",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-19-gavi-wuenic-lower-income",
    "category": "institutional",
    "headline": "Gavi records 73 million children immunised in 2025, its last fully funded year",
    "summary": "Gavi's analysis of the 2025 WUENIC data, published 15 July, reports lower-income countries immunised 73 million children with Gavi-supported vaccines, cut zero-dose children by 640,000 to 9.5 million, and reached 'breadth of protection' of 65%, equal to the rest of the world for the first time. Gavi warns 2025 was its last fully funded year and that its underfunded 2026-2030 period puts the malaria vaccine programme, hexavalent and meningitis switches and global stockpiles at risk.",
    "source": "Gavi, the Vaccine Alliance",
    "url": "https://www.gavi.org/news/media-room/strong-progress-lower-income-countries-underscores-need-sustained-investment",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-19-who-dementia-guidelines",
    "category": "institutional",
    "headline": "WHO: up to 45% of dementia risk can be prevented or delayed",
    "summary": "WHO released updated guidelines this week on reducing cognitive decline and dementia risk, concluding that up to 45% of risk can be prevented or delayed by addressing tobacco and alcohol use, social isolation, physical inactivity, air pollution and NCDs including hypertension and diabetes. More than 57 million people live with dementia worldwide, with nearly 10 million newly diagnosed each year; a new recommendation on reducing air-pollution exposure is included.",
    "source": "Health Policy Watch",
    "url": "https://healthpolicy-watch.news/who-up-to-45-dementia-risk-can-be-prevented-or-delayed/",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-19-schisto-drone-mapping-nigeria",
    "category": "academic",
    "headline": "Drone mapping identifies schistosomiasis hotspots along Nigeria's Oyan River",
    "summary": "Researchers from the Federal University of Agriculture, Abeokuta and UTHealth Houston combined community-led snail surveys with drone imagery flown at 58 metres to risk-map water access points along the Oyan River in Ogun State, finding submerged vegetation such as Ceratophyllum demersum harbours more parasite-carrying snails than emergent plants. A June 2026 cross-sectional study found 77.8% prevalence in Abeokuta North, reaching 90.3% at Imala Odo's primary school, where praziquantel shortages and rapid reinfection undercut mass drug administration.",
    "source": "Think Global Health (CFR)",
    "url": "https://www.thinkglobalhealth.org/article/drone-mapping-a-birds-eye-view-of-a-neglected-tropical-disease-in-nigeria",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-19-who-reform-next-dg",
    "category": "news",
    "headline": "Former WHO acting DG sets out five structural reforms ahead of September nomination deadline",
    "summary": "Writing in Think Global Health on 13 July, Anders Nordström argues the WHO director-general race should turn on institutional function rather than personality, proposing that WHO refocus on normative and technical work, move to a single non-renewable term, appoint regional directors through open recruitment rather than regional political processes, restore the executive board as a genuine board of trustees, and shift financing to assessed contributions. He points to the competing WHO and Africa CDC Ebola announcements as evidence of unresolved role confusion.",
    "source": "Think Global Health (CFR)",
    "url": "https://www.thinkglobalhealth.org/article/reforming-who-five-considerations-for-the-next-director-general",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-19-wmo-dust-bulletin-2025",
    "category": "institutional",
    "headline": "WMO dust bulletin records extreme regional storms despite flat global averages",
    "summary": "The tenth WMO Airborne Dust Bulletin finds 2025 global mean dust concentrations similar to 2024 but severe regional extremes, with around 2,000 million tonnes of dust entering the atmosphere annually and dust storms now affecting more than 150 countries. An April cold front over Iraq sent nearly 4,000 people to emergency rooms with respiratory problems, China saw its most extensive storm in a decade from 10-14 April, and El Paso recorded 12 dust storms, its most since 1935.",
    "source": "Health Policy Watch",
    "url": "https://healthpolicy-watch.news/record-breaking-dust-storms-in-2025-sent-pollution-soaring-in-china-and-us-mexico-border/",
    "publishedAt": "2026-07-19T08:06:16Z"
  },
  {
    "id": "2026-07-20-bundibugyo-ebola-don612",
    "category": "institutional",
    "headline": "Bundibugyo Ebola outbreak in DRC passes 1,400 confirmed cases with 31% case fatality",
    "summary": "WHO's 3 July Disease Outbreak News reports 1,460 confirmed cases and 452 deaths in the Democratic Republic of the Congo as of 1 July, a crude case fatality ratio of 30.9%, with 564 new confirmed cases in the fortnight since the previous report and 102 infections among health and care workers. Ituri province accounts for 91% of cases; Uganda has reported 20 confirmed cases with no new detections since 21 June, and France confirmed one imported case in a returning doctor on 24 June.",
    "source": "WHO Disease Outbreak News",
    "url": "https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON612",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-america-first-mou-tracker",
    "category": "news",
    "headline": "33 'America First' bilateral health MOUs commit $23.5 billion, 39% from recipient governments",
    "summary": "Think Global Health's tracker finds the 33 memoranda of understanding signed as of 6 July govern at least $23.5 billion of health spending between 2026 and 2030, roughly 39% of it to be funded by partner governments, against IHME estimates that global health financing fell 21% from 2024 to 2025. Cameroon, Liberia, Nigeria and Uganda face cofinancing commitments that outpace projected health-budget growth, and TB goes unmentioned in the available information for 21 agreements.",
    "source": "Think Global Health (CFR)",
    "url": "https://www.thinkglobalhealth.org/article/tracking-the-america-first-bilateral-health-agreements",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-us-cyclospora-han",
    "category": "news",
    "headline": "CDC issues Cyclospora health alert months after first reports, source still unknown",
    "summary": "CDC issued a Health Alert Network advisory on the multistate cyclosporiasis outbreak having received case reports by 1 May, reporting 1,645 confirmed cases and 141 hospitalisations with a further 5,100 awaiting confirmation. Michigan has logged 3,309 cases and Ohio's Toledo-Lucas County 1,119, across 31 states reporting cases; CIDRAP's Michael Osterholm criticised the delay, and the parasite cannot be cultured or subtyped through PulseNet, leaving investigators reliant on partial genotyping.",
    "source": "CIDRAP",
    "url": "https://www.cidrap.umn.edu/cyclospora/what-we-truly-know-about-huge-us-cyclospora-outbreak-and-what-we-don-t",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-mmwr-alpha-gal-seroprevalence",
    "category": "academic",
    "headline": "MMWR: alpha-gal IgE seroprevalence reaches 24% in five high-burden US states",
    "summary": "CDC researchers tested 3,000 blood-donor serum samples collected November 2024 to April 2025 across 10 states and estimated alpha-gal IgE seroprevalence of 24.0% in the five highest states (Arkansas, Kentucky, Missouri, Tennessee, Virginia), peaking at 31.2% in Arkansas. The authors caution that seropositivity is far more common than alpha-gal syndrome itself and that clinicians should test only patients with compatible symptoms.",
    "source": "CDC MMWR",
    "url": "https://www.cdc.gov/mmwr/volumes/75/wr/mm7525a1.htm",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-stimulate-icp-long-covid",
    "category": "academic",
    "headline": "Repurposed drugs give only small, non-durable gains in long-COVID fatigue",
    "summary": "The STIMULATE-ICP trial, published in The Lancet Infectious Diseases, randomised nearly 800 adults attending long-COVID clinics in England to usual care or colchicine, famotidine-loratadine or rivaroxaban. Fatigue improved by 4.3 points on usual care alone over 12 weeks, with only small additional reductions from colchicine (-1.49) and famotidine-loratadine (-1.48) that did not persist after treatment stopped.",
    "source": "The Lancet Infectious Diseases (via CIDRAP)",
    "url": "https://www.cidrap.umn.edu/covid-19/2-common-drugs-may-offer-short-term-improvements-long-covid-related-fatigue",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-enteric-infection-deaths-gbd",
    "category": "academic",
    "headline": "Enteric infection deaths fall from 3.69 million to 1.27 million since 1990",
    "summary": "A Lancet Infectious Diseases analysis published 11 June 2026 estimates enteric infectious diseases caused 1.27 million deaths globally in 2023, down from 3.69 million in 1990, with the age-standardised mortality rate falling from 74.1 to 16.4 per 100,000. Rotavirus remains the leading cause of diarrhoeal disease at 16.3%, ahead of norovirus (10.2%) and Shigella (9.3%); South Asia and sub-Saharan Africa accounted for 599,000 and 501,000 deaths respectively.",
    "source": "The Lancet Infectious Diseases (via CIDRAP)",
    "url": "https://www.cidrap.umn.edu/rotavirus/world-seeing-far-fewer-deaths-infections-cause-diarrhea",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-paho-measles-americas",
    "category": "institutional",
    "headline": "Measles resurgence in the Americas undoes years of elimination progress",
    "summary": "PAHO is running a multi-country measles outbreak response for 2026 after the Americas recorded 14,891 confirmed cases and 29 deaths across 13 countries in 2025, roughly a 32-fold increase on the previous year. In the United States, 2,260 confirmed cases had been reported in 2026 as of 16 July, already close to the full-year 2025 total.",
    "source": "PAHO/WHO",
    "url": "https://www.paho.org/en/measles-multi-country-outbreak-2026",
    "publishedAt": "2026-07-20T11:47:50Z"
  },
  {
    "id": "2026-07-20-world-bank-grph-17-dollars",
    "category": "institutional",
    "headline": "World Bank: low-income countries spend $17 per capita per year on health",
    "summary": "The World Bank's Government Resources and Projections for Health series finds low-income countries spend about $17 per capita annually on health, and projects that most LICs and many lower-middle-income countries will see combined government and donor health spending decline by 2030. It argues a third of LICs and LMICs have the fiscal space to raise health's budget share, alongside health taxes and efficiency gains through primary care and better budget execution.",
    "source": "World Bank",
    "url": "https://www.worldbank.org/en/topic/health/publication/government-resources-projections-health-financing-report",
    "publishedAt": "2026-07-20T11:47:50Z"
  }
];

  const EXPIRY_HOURS = 72;
  const dismissedKey = "ghd_dismissed_v1";
  const getDismissed = () => {
    try { return JSON.parse(localStorage.getItem(dismissedKey) || "{}"); }
    catch (e) { return {}; }
  };
  const dismissed = getDismissed();

  const tagLabel = { news: "News", academic: "Academic", institutional: "Institutional" };

  const ageLabel = (iso) => {
    const hrs = (now - new Date(iso).getTime()) / 3600000;
    if (hrs < 1) return "just now";
    if (hrs < 24) return Math.round(hrs) + "h ago";
    return Math.round(hrs / 24) + "d ago";
  };

  function isExpired(iso) {
    return (now - new Date(iso).getTime()) / 3600000 >= EXPIRY_HOURS;
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const visible = items.filter(it => !dismissed[it.id] && !isExpired(it.publishedAt));

    document.getElementById("countMeta").textContent =
      visible.length + (visible.length === 1 ? " item" : " items") + " · rolling 72h window";
    document.getElementById("emptyState").style.display = visible.length ? "none" : "block";

    visible.forEach(it => {
      const el = document.createElement("div");
      el.className = "item";
      el.id = "row-" + it.id;
      el.innerHTML = `
        <div class="tick-wrap">
          <button class="tick" aria-label="Mark read" data-id="${it.id}"></button>
        </div>
        <div class="body">
          <div class="row-top">
            <span class="tag ${it.category}">${tagLabel[it.category]}</span>
            <span class="age">${ageLabel(it.publishedAt)}</span>
          </div>
          <p class="headline">${it.headline}</p>
          <p class="summary">${it.summary}</p>
          <a class="source-link" href="${it.url}" target="_blank" rel="noopener">${it.source} →</a>
        </div>
      `;
      list.appendChild(el);
    });

    list.querySelectorAll(".tick").forEach(btn => {
      btn.addEventListener("click", () => onTick(btn.dataset.id));
    });
  }

  function onTick(id) {
    const row = document.getElementById("row-" + id);
    const btn = row.querySelector(".tick");
    btn.classList.add("checked");
    row.classList.add("clearing");
    dismissed[id] = now;
    localStorage.setItem(dismissedKey, JSON.stringify(dismissed));
    setTimeout(() => {
      row.classList.add("gone");
      setTimeout(render, 380);
    }, 350);
  }

  render();
</script>
</body>
</html>
