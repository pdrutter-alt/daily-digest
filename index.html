<!-- Canonical shell for the global-health-digest live artifact.
     Daily build: read data/pool.json, merge/curate, write the merged pool
     back to pool.json, then regenerate this file with the pool as the
     `items` array below (keep ids stable so per-device tick state still
     applies), and call mcp__cowork__update_artifact with id
     "global-health-digest". Do not change CSS/JS structure without
     updating this template. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Global Health Digest</title>
<style>
  :root {
    color-scheme: light;
    --ink: #1a1f26;
    --ink-soft: #4b5763;
    --ink-faint: #8a94a1;
    --paper: #fdfcfa;
    --line: #e4e0d8;
    --accent: #1f4d3d;
    --news: #3a5a78;
    --academic: #6b3f2e;
    --institutional: #8a6d1a;
    --tick: #1f4d3d;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 18px calc(96px + env(safe-area-inset-bottom)); }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  h1 { font-size: 23px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .meta { font-size: 13.5px; color: var(--ink-faint); }
  .demo-note {
    font-size: 14px; color: var(--ink-soft); background: #f4f1ea;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 20px; line-height: 1.5;
  }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex; gap: 14px; padding: 18px 2px;
    border-bottom: 1px solid var(--line);
    transition: opacity 0.35s ease, transform 0.35s ease, max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
    max-height: 400px; overflow: hidden;
  }
  .item.clearing { opacity: 0; transform: translateX(6px); }
  .item.gone { max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; margin: 0; }
  .tick-wrap { flex-shrink: 0; padding-top: 2px; }
  .tick {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--ink-faint); background: none;
    cursor: pointer; display: block; padding: 0; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  /* Invisible 44px hit area for comfortable tapping on touch screens */
  .tick::before {
    content: ""; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
  .tick:hover { border-color: var(--tick); }
  .tick.checked { background: var(--tick); border-color: var(--tick); }
  .tick.checked::after {
    content: ""; position: absolute; left: 8px; top: 4px;
    width: 6px; height: 11px; border: solid white;
    border-width: 0 2.5px 2.5px 0; transform: rotate(40deg);
  }
  .body { flex: 1; min-width: 0; }
  .row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #fff;
  }
  .tag.news { background: var(--news); }
  .tag.academic { background: var(--academic); }
  .tag.institutional { background: var(--institutional); }
  .age { font-size: 12.5px; color: var(--ink-faint); }
  .headline { font-size: 17.5px; font-weight: 600; line-height: 1.4; margin: 0 0 6px; color: var(--ink); letter-spacing: -0.005em; }
  .summary { font-size: 15.5px; line-height: 1.55; color: var(--ink-soft); margin: 0 0 8px; }
  .source-link { font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; padding: 4px 0; }
  .source-link:hover { text-decoration: underline; }
  .empty { text-align: center; color: var(--ink-faint); font-size: 15px; padding: 48px 10px; }
  footer { margin-top: 24px; font-size: 12.5px; color: var(--ink-faint); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Global Health Digest</h1>
    <div class="meta" id="countMeta">— items</div>
  </header>

  <div class="demo-note">Updated 2026-07-17 &middot; 8 new &middot; 15 total</div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyState" style="display:none;">Nothing left to read. Come back tomorrow.</div>

  <footer>Rolling 72-hour window · tick to clear early · state is local to this device</footer>
</div>

<script>
  const now = Date.now();

  const items = [
  {
    "id": "2026-07-16-ebola-drc-700-deaths",
    "category": "news",
    "headline": "DRC Ebola outbreak passes 700 deaths, spreading faster than it can be tracked",
    "summary": "The Bundibugyo-strain Ebola outbreak in the Democratic Republic of the Congo has reached close to 2,000 confirmed cases and more than 700 deaths, which WHO describes as the fastest-growing Ebola outbreak on record. About 80% of new cases are arising outside known contact lists and many patients are dying in their communities before reaching care; there is still no licensed vaccine or treatment for this Ebola species.",
    "source": "NPR",
    "url": "https://www.npr.org/2026/07/15/g-s1-133630/ebola-congo-deaths",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-sudan-cholera-alert",
    "category": "institutional",
    "headline": "WHO alert warns Sudan cholera outbreak could worsen with rains and conflict",
    "summary": "WHO has issued a new alert over cholera in war-torn Sudan, with more than 1,330 confirmed cases and 114 deaths reported as of 10 July 2026, mainly across the Darfurs and Kordofans. The case-fatality rate is already about 13.7%, far above the 1% emergency threshold, and is expected to rise as the rainy season and restricted humanitarian access accelerate spread.",
    "source": "UN News",
    "url": "https://news.un.org/en/story/2026/07/1167913",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-global-fund-grant-cuts",
    "category": "news",
    "headline": "Global Fund to cut $1.4 billion from already-awarded grants across 100+ countries",
    "summary": "Facing a replenishment shortfall, the Global Fund plans to cut about US$1.4 billion from grants it has already awarded, reductions that will hit more than 100 countries. Its 2026-2028 country allocations of roughly US$10.8 billion are the lowest since the 2020 funding cycle.",
    "source": "Devex",
    "url": "https://www.devex.com/news/devex-checkup-1-4b-global-fund-cuts-hit-over-100-countries-110462",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-uk-measles-third-death",
    "category": "news",
    "headline": "England records third measles death of 2026 as cases pass 880",
    "summary": "The UK Health Security Agency reports 883 confirmed measles cases in England so far in 2026, alongside a third death, this time an adult with an underlying immunological condition following the deaths of two children the previous month. More than half of cases are in London, reflecting sub-optimal MMR coverage.",
    "source": "CIDRAP",
    "url": "https://www.cidrap.umn.edu/cyclospora/quick-takes-more-michigan-cyclospora-uk-measles-death-h5n1-avian-flu-cambodian-baby",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-america-first-health-mous",
    "category": "news",
    "headline": "US signs 33 bilateral health agreements under 'America First' global health strategy",
    "summary": "A Think Global Health tracker finds the US had signed memoranda of understanding with 33 countries as of 6 July 2026 under its America First Global Health Strategy, shifting from traditional aid toward jointly financed bilateral arrangements after dissolving USAID, withdrawing from WHO and cutting foreign health assistance.",
    "source": "Think Global Health (CFR)",
    "url": "https://www.thinkglobalhealth.org/article/tracking-the-america-first-bilateral-health-agreements",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-nejm-menb-gonorrhoea",
    "category": "academic",
    "headline": "NEJM trial tests meningococcal B vaccine against gonorrhoea",
    "summary": "A study published in the New England Journal of Medicine on 8 July 2026 evaluated the meningococcal B vaccine for preventing Neisseria gonorrhoeae infection, a vaccine-repurposing approach that has drawn interest given rising antimicrobial resistance in gonorrhoea.",
    "source": "New England Journal of Medicine",
    "url": "https://www.nejm.org/doi/full/10.1056/NEJMoa2516739",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-16-mpox-cladei-outside-africa",
    "category": "institutional",
    "headline": "Clade I mpox now transmitting in communities outside Africa",
    "summary": "UK travel-health body NaTHNaC reports evidence of community transmission of clade I (including clade Ib) mpox outside the African region, with locally acquired cases in the US and parts of mainland Europe that have no travel link to countries with known clade Ib transmission.",
    "source": "NaTHNaC (TravelHealthPro)",
    "url": "https://travelhealthpro.org.uk/news/792/mpox-outbreak-community-transmission-of-clade-i-mpox-virus-outside-the-african-region",
    "publishedAt": "2026-07-16T08:06:09Z"
  },
  {
    "id": "2026-07-17-wuenic-immunization-2025",
    "category": "institutional",
    "headline": "WHO/UNICEF 2025 estimates: 13.5 million infants received no vaccine dose",
    "summary": "The WHO-UNICEF 2025 immunization estimates (WUENIC), released 15 July 2026, find about 13.5 million infants got no vaccine dose in their first year, roughly 750,000 fewer than in 2024. Global DTP3 coverage reached 85% and DTP1 90%, each up one point year-on-year but still a point below 2019, while 7.3 million infants who received DTP1 missed their first measles dose.",
    "source": "WHO",
    "url": "https://www.who.int/news/item/15-07-2026-global-childhood-immunization-coverage-inches-forward-despite-conflict-and-hesitancy---unicef--who",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-covid-ve-vision-2025-26",
    "category": "academic",
    "headline": "Updated 2025-2026 COVID vaccines cut hospitalizations by about half",
    "summary": "A test-negative study in JAMA Network Open using the VISION network estimated that the updated 2025-2026 COVID-19 vaccines, targeting JN.1-derived lineages, reduced emergency-department and urgent-care visits by about 50% and hospitalizations by about 55% among adults with COVID-like illness. Estimates drew on roughly 85,700 ED/UC encounters and 26,000 hospitalizations from September to December 2025.",
    "source": "JAMA Network Open",
    "url": "https://doi.org/10.1001/jamanetworkopen.2026.25152",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-amr-governance-193-countries",
    "category": "academic",
    "headline": "Nature Medicine maps antimicrobial-resistance governance across 193 countries",
    "summary": "A Nature Medicine study evaluates antimicrobial resistance governance across all 193 countries, mapping wide variation in national capacity to inform the updated 2026-2036 Global Action Plan on AMR that the World Health Assembly adopted in May 2026. The analysis highlights persistent gaps between having national action plans and being able to cost, budget and monitor them.",
    "source": "Nature Medicine",
    "url": "https://www.nature.com/articles/s41591-026-04257-1",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-paho-dengue-grade3",
    "category": "institutional",
    "headline": "PAHO keeps highest-level dengue response as Americas pass 1.1 million cases",
    "summary": "PAHO is maintaining a Grade-3 multi-country dengue response, its highest emergency level, after the Americas logged more than 1.1 million suspected dengue cases and 266 deaths in the first 20 weeks of 2026. Case counts are running about 64% below the same period in 2025, which was the region's worst dengue year on record.",
    "source": "PAHO/WHO",
    "url": "https://www.paho.org/en/topics/dengue/dengue-multi-country-grade-3-outbreak",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-global-fund-gc8-board",
    "category": "institutional",
    "headline": "Global Fund Board sets GC8 strategy within $930 million operating budget",
    "summary": "At its July 2026 meeting the Global Fund Board took decisions to deliver its GC8 strategy within a Board-approved US$930 million operating-expenditure envelope and to deepen collaboration with Gavi on malaria, TB and health-systems support. The moves come as the Fund manages a constrained replenishment and previously flagged grant reductions.",
    "source": "The Global Fund",
    "url": "https://www.theglobalfund.org/en/news/2026/2026-07-14-global-fund-board-takes-strategic-decisions-navigate-changing-global-health-landscape/",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-pepfar-cdc-funding-cliff",
    "category": "news",
    "headline": "CDC-run PEPFAR awards for 8.7 million people face a September funding cliff",
    "summary": "About 120 CDC-administered PEPFAR awards supporting HIV/AIDS services for more than 8.7 million people are set to expire at the end of September 2026 with no confirmed replacement mechanism, as the US administration moves CDC toward a fee-for-service model. Ghana and Zimbabwe have rejected their America First bilateral health agreements.",
    "source": "CNN",
    "url": "https://www.cnn.com/2026/07/10/africa/cdc-pepfar-hiv-aids-program-cliff-intl",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-michigan-cyclosporiasis",
    "category": "news",
    "headline": "Michigan cyclosporiasis cluster reaches 1,251 cases",
    "summary": "Michigan has reported 1,251 cyclosporiasis cases and 44 hospitalizations as of 9 July 2026, one of the larger recent US clusters of the parasitic foodborne illness, which is usually linked to contaminated fresh produce.",
    "source": "Global Health Press (ID-EA)",
    "url": "https://id-ea.org/global-outbreak-update-key-infectious-disease-events-13th-july-2026/",
    "publishedAt": "2026-07-17T08:43:26Z"
  },
  {
    "id": "2026-07-17-ethiopia-cvdpv1-polio",
    "category": "institutional",
    "headline": "Ethiopia reports new vaccine-derived poliovirus case in Gambella",
    "summary": "Ethiopia has reported a new circulating vaccine-derived poliovirus type 1 (cVDPV1) case in Gambella, with paralysis onset on 16 May 2026, bringing 2026 cVDPV1 cases to five. The detection underscores continued transmission of vaccine-derived polioviruses in the Horn of Africa.",
    "source": "Global Health Press (ID-EA)",
    "url": "https://id-ea.org/global-outbreak-update-key-infectious-disease-events-13th-july-2026/",
    "publishedAt": "2026-07-17T08:43:26Z"
  }
];

  const EXPIRY_HOURS = 72;
  const dismissedKey = "ghd_dismissed_v1";
  const getDismissed = () => {
    try { return JSON.parse(localStorage.getItem(dismissedKey) || "{}"); }
    catch (e) { return {}; }
  };
  const dismissed = getDismissed();

  const tagLabel = { news: "News", academic: "Academic", institutional: "Institutional" };

  const ageLabel = (iso) => {
    const hrs = (now - new Date(iso).getTime()) / 3600000;
    if (hrs < 1) return "just now";
    if (hrs < 24) return Math.round(hrs) + "h ago";
    return Math.round(hrs / 24) + "d ago";
  };

  function isExpired(iso) {
    return (now - new Date(iso).getTime()) / 3600000 >= EXPIRY_HOURS;
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const visible = items.filter(it => !dismissed[it.id] && !isExpired(it.publishedAt));

    document.getElementById("countMeta").textContent =
      visible.length + (visible.length === 1 ? " item" : " items") + " · rolling 72h window";
    document.getElementById("emptyState").style.display = visible.length ? "none" : "block";

    visible.forEach(it => {
      const el = document.createElement("div");
      el.className = "item";
      el.id = "row-" + it.id;
      el.innerHTML = `
        <div class="tick-wrap">
          <button class="tick" aria-label="Mark read" data-id="${it.id}"></button>
        </div>
        <div class="body">
          <div class="row-top">
            <span class="tag ${it.category}">${tagLabel[it.category]}</span>
            <span class="age">${ageLabel(it.publishedAt)}</span>
          </div>
          <p class="headline">${it.headline}</p>
          <p class="summary">${it.summary}</p>
          <a class="source-link" href="${it.url}" target="_blank" rel="noopener">${it.source} →</a>
        </div>
      `;
      list.appendChild(el);
    });

    list.querySelectorAll(".tick").forEach(btn => {
      btn.addEventListener("click", () => onTick(btn.dataset.id));
    });
  }

  function onTick(id) {
    const row = document.getElementById("row-" + id);
    const btn = row.querySelector(".tick");
    btn.classList.add("checked");
    row.classList.add("clearing");
    dismissed[id] = now;
    localStorage.setItem(dismissedKey, JSON.stringify(dismissed));
    setTimeout(() => {
      row.classList.add("gone");
      setTimeout(render, 380);
    }, 350);
  }

  render();
</script>
</body>
</html>
